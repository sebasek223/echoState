<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1026" />
      <stop offset="100%" stop-color="#080914" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#8b5cf6" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  <!-- Outer Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#glowGrad)" stroke-width="8" opacity="0.4" />
  <!-- Glowing Core Compass/Sprout icon -->
  <g filter="url(#shadow)">
    <!-- Leaf 1 (Left) -->
    <path d="M256,120 Q160,200 256,360 Q256,220 256,120 Z" fill="url(#glowGrad)" />
    <!-- Leaf 2 (Right) -->
    <path d="M256,120 Q352,200 256,360 Q256,220 256,120 Z" fill="#c084fc" opacity="0.8" />
    <!-- Small Zen Center Dot -->
    <circle cx="256" cy="280" r="14" fill="#ffffff" />
  </g>
</svg>
